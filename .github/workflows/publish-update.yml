# Release-Qualitaetsgate (kein Auto-Publish mehr)
#
# Loest bei einem veroeffentlichten, regulaeren Release aus und prueft das
# Plugin gegen die Release-Konvention: php -l, Header-Version == Tag, SemVer
# X.Y.Z und ZIP-Strukturcheck (inkl. Ausschluss von bin/ und .sh). Bei jedem
# fehlgeschlagenen Gate bricht der Lauf ab und wird rot.
#
# WICHTIG – kein automatisches Veroeffentlichen mehr:
# Der Update-Server verlangt seit v1.4.0 eine gueltige Ed25519-Signatur und
# lehnt unsignierte Pakete mit HTTP 422 ab. Ein automatischer POST aus der CI
# waere unsigniert und wuerde scheitern. Das signierte Veroeffentlichen ist
# darum jetzt ein manueller Schritt (lokal bauen, mit tools/bd-sign.php
# signieren, per Deploy-Token hochladen). Details in docs/AUTO-PUBLISH.md.
#
# Sicherheit:
# - Trigger nur on: release: published, kein pull_request / pull_request_target.
# - Pre-Releases werden explizit ausgeschlossen.
# - permissions: contents: read (kein Schreibzugriff auf das Repo noetig).
# - Kein Deploy-Token, kein Netzwerkzugriff auf den Update-Server.

name: Release-Qualitaetsgate

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  quality-gate:
    # Nur regulaere Releases. Pre-Releases (und Drafts, die ohnehin kein
    # published-Event ausloesen) werden hart ausgeschlossen.
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest

    env:
      SLUG: gutenberg-formbuilder

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Version aus Tag ableiten (ohne fuehrendes v)
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # G-4: SemVer X.Y.Z erzwingen.
      - name: "Gate G-4: SemVer X.Y.Z"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]{1,4}\.[0-9]{1,4}\.[0-9]{1,4}$'; then
            echo "::error::Tag «${{ steps.ver.outputs.tag }}» ergibt keine gueltige SemVer X.Y.Z ($VERSION)."
            exit 1
          fi

      # G-1: php -l ueber alle .php-Dateien.
      - name: "Gate G-1: php -l"
        run: |
          sudo apt-get update -qq && sudo apt-get install -y php-cli >/dev/null 2>&1 || true
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f" >/dev/null 2>err.txt; then
              echo "::error file=$f::$(cat err.txt)"
              FAIL=1
            fi
          done < <(find . -path ./node_modules -prune -o -name '*.php' -print0)
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::php -l hat Syntaxfehler gefunden."
            exit 1
          fi

      # G-2: Header-Version === tag_name ohne v.
      - name: "Gate G-2: Header-Version === Tag"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          HEADER_VERSION="$(grep -iE '^\s*\*?\s*Version:' "${SLUG}.php" | head -n1 | sed -E 's/.*Version:\s*//' | tr -d '\r' | xargs)"
          echo "Header-Version: $HEADER_VERSION / Tag-Version: $VERSION"
          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "::error::Plugin-Header meldet «$HEADER_VERSION», Tag erwartet «$VERSION»."
            exit 1
          fi

      - name: ZIP nach bestehender Konvention bauen
        run: |
          BUILD_DIR="build/${SLUG}"
          mkdir -p "$BUILD_DIR"
          # Ausschluesse: Marketing, graphify-out, VCS, Build-Artefakte, Dev-Files.
          rsync -a ./ "$BUILD_DIR/" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'bin' \
            --exclude '*.sh' \
            --exclude 'deutsch-für-profis.txt' \
            --exclude 'graphify-out' \
            --exclude 'build' \
            --exclude '*.zip' \
            --exclude '.DS_Store' \
            --exclude 'Gutenberg Formbuilder Plugin Marketing' \
            --exclude 'Gutenberg Formbuilder Plugin Marketing.zip'
          ( cd build && zip -r -q "../${SLUG}.zip" "${SLUG}" )
          echo "ZIP gebaut: ${SLUG}.zip"

      # G-3: ZIP-Strukturcheck. Top-Level muss genau gutenberg-formbuilder/ sein,
      # kein Marketing-Ordner, kein graphify-out, kein bin/ oder .sh.
      - name: "Gate G-3: ZIP-Strukturcheck"
        run: |
          LIST="$(unzip -Z1 "${SLUG}.zip")"
          # Jeder Eintrag muss mit gutenberg-formbuilder/ beginnen.
          if echo "$LIST" | grep -vqE "^${SLUG}/"; then
            echo "::error::ZIP enthaelt Eintraege ausserhalb von ${SLUG}/."
            echo "$LIST" | grep -vE "^${SLUG}/" | head
            exit 1
          fi
          if echo "$LIST" | grep -qiE "Marketing|graphify-out"; then
            echo "::error::ZIP enthaelt Marketing- oder graphify-out-Inhalte."
            exit 1
          fi
          # bin/ und .sh duerfen nie im Paket landen (Release-Konvention).
          if echo "$LIST" | grep -qE "^${SLUG}/bin/"; then
            echo "::error::ZIP enthaelt einen bin/-Ordner."
            exit 1
          fi
          if echo "$LIST" | grep -qiE "\.sh$"; then
            echo "::error::ZIP enthaelt Shell-Skripte (.sh)."
            exit 1
          fi
          # Hauptdatei muss vorhanden sein.
          if ! echo "$LIST" | grep -qE "^${SLUG}/${SLUG}\.php$"; then
            echo "::error::Plugin-Hauptdatei ${SLUG}/${SLUG}.php fehlt im ZIP."
            exit 1
          fi

      - name: "Hinweis: signiertes Veroeffentlichen erfolgt manuell"
        run: |
          echo "Alle Qualitaetsgates bestanden fuer Version ${{ steps.ver.outputs.version }}."
          echo
          echo "Dieser Workflow veroeffentlicht NICHT mehr automatisch."
          echo "Der Update-Server verlangt seit v1.4.0 eine gueltige Signatur und"
          echo "lehnt unsignierte Pakete mit HTTP 422 ab."
          echo
          echo "Signiertes Veroeffentlichen – manueller Schritt (lokal):"
          echo "  1. Version im Plugin-Header heben."
          echo "  2. ZIP nach der Release-Konvention bauen."
          echo "  3. ZIP mit tools/bd-sign.php signieren."
          echo "  4. ZIP samt Signatur und key_id per Deploy-Token hochladen."
          echo
          echo "Schrittfolge im Detail: siehe docs/AUTO-PUBLISH.md."
