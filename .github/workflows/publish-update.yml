# Auto-Publish: GitHub-Release -> plugins.blitzdonner.ch
#
# Loest bei einem veroeffentlichten, regulaeren Release aus, baut das Plugin-ZIP
# nach der bestehenden Konvention und schickt es an den Auto-Publish-Endpunkt
# des Update-Servers. Bei jedem fehlgeschlagenen Gate oder einem HTTP-Status
# != 2xx vom Server bricht der Lauf ab und wird rot – es wird dann NICHT gepostet.
#
# Sicherheit:
# - Trigger nur on: release: published, kein pull_request / pull_request_target.
# - Pre-Releases werden explizit ausgeschlossen.
# - permissions: contents: read (kein Schreibzugriff auf das Repo noetig).
# - Das Deploy-Token kommt aus dem Environment-Secret BD_DEPLOY_TOKEN und wird
#   nie geechoet oder in Zwischenvariablen geloggt.
#
# Naechster verbindlicher Schritt (bewusst noch nicht enthalten, Mittelweg):
# Ed25519-Signatur des ZIP und serverseitige Signaturpruefung.

name: Publish update to plugins.blitzdonner.ch

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    # Nur regulaere Releases. Pre-Releases (und Drafts, die ohnehin kein
    # published-Event ausloesen) werden hart ausgeschlossen.
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: production

    env:
      SLUG: gutenberg-formbuilder

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Version aus Tag ableiten (ohne fuehrendes v)
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # G-4: SemVer X.Y.Z erzwingen.
      - name: "Gate G-4: SemVer X.Y.Z"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]{1,4}\.[0-9]{1,4}\.[0-9]{1,4}$'; then
            echo "::error::Tag «${{ steps.ver.outputs.tag }}» ergibt keine gueltige SemVer X.Y.Z ($VERSION)."
            exit 1
          fi

      # G-1: php -l ueber alle .php-Dateien.
      - name: "Gate G-1: php -l"
        run: |
          sudo apt-get update -qq && sudo apt-get install -y php-cli >/dev/null 2>&1 || true
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f" >/dev/null 2>err.txt; then
              echo "::error file=$f::$(cat err.txt)"
              FAIL=1
            fi
          done < <(find . -path ./node_modules -prune -o -name '*.php' -print0)
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::php -l hat Syntaxfehler gefunden."
            exit 1
          fi

      # G-2: Header-Version === tag_name ohne v.
      - name: "Gate G-2: Header-Version === Tag"
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          HEADER_VERSION="$(grep -iE '^\s*\*?\s*Version:' "${SLUG}.php" | head -n1 | sed -E 's/.*Version:\s*//' | tr -d '\r' | xargs)"
          echo "Header-Version: $HEADER_VERSION / Tag-Version: $VERSION"
          if [ "$HEADER_VERSION" != "$VERSION" ]; then
            echo "::error::Plugin-Header meldet «$HEADER_VERSION», Tag erwartet «$VERSION»."
            exit 1
          fi

      - name: ZIP nach bestehender Konvention bauen
        run: |
          BUILD_DIR="build/${SLUG}"
          mkdir -p "$BUILD_DIR"
          # Ausschluesse: Marketing, graphify-out, VCS, Build-Artefakte, Dev-Files.
          rsync -a ./ "$BUILD_DIR/" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'bin' \
            --exclude '*.sh' \
            --exclude 'deutsch-für-profis.txt' \
            --exclude 'graphify-out' \
            --exclude 'build' \
            --exclude '*.zip' \
            --exclude '.DS_Store' \
            --exclude 'Gutenberg Formbuilder Plugin Marketing' \
            --exclude 'Gutenberg Formbuilder Plugin Marketing.zip'
          ( cd build && zip -r -q "../${SLUG}.zip" "${SLUG}" )
          echo "ZIP gebaut: ${SLUG}.zip"

      # G-3: ZIP-Strukturcheck. Top-Level muss genau gutenberg-formbuilder/ sein,
      # kein Marketing-Ordner, kein graphify-out.
      - name: "Gate G-3: ZIP-Strukturcheck"
        run: |
          LIST="$(unzip -Z1 "${SLUG}.zip")"
          # Jeder Eintrag muss mit gutenberg-formbuilder/ beginnen.
          if echo "$LIST" | grep -vqE "^${SLUG}/"; then
            echo "::error::ZIP enthaelt Eintraege ausserhalb von ${SLUG}/."
            echo "$LIST" | grep -vE "^${SLUG}/" | head
            exit 1
          fi
          if echo "$LIST" | grep -qiE "Marketing|graphify-out"; then
            echo "::error::ZIP enthaelt Marketing- oder graphify-out-Inhalte."
            exit 1
          fi
          # Hauptdatei muss vorhanden sein.
          if ! echo "$LIST" | grep -qE "^${SLUG}/${SLUG}\.php$"; then
            echo "::error::Plugin-Hauptdatei ${SLUG}/${SLUG}.php fehlt im ZIP."
            exit 1
          fi

      - name: An Update-Server publizieren
        env:
          BD_DEPLOY_TOKEN: ${{ secrets.BD_DEPLOY_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Release-Body in eine Datei schreiben (kein Token, kein Echo).
          cat > release-body.txt <<'RELEASE_BODY_EOF'
          ${{ github.event.release.body }}
          RELEASE_BODY_EOF

          HTTP_CODE="$(curl -sS -o response.json -w '%{http_code}' \
            -X POST "https://plugins.blitzdonner.ch/wp-json/bd-updater/publish/${SLUG}" \
            -H "Authorization: Bearer ${BD_DEPLOY_TOKEN}" \
            -F "zip=@${SLUG}.zip;type=application/zip" \
            -F "version=${VERSION}" \
            -F "changelog=<release-body.txt")"

          echo "Server-Antwort (HTTP $HTTP_CODE):"
          cat response.json || true
          echo

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Update-Server antwortete mit HTTP $HTTP_CODE – Publish fehlgeschlagen."
            exit 1
          fi
          echo "Publish erfolgreich: Version ${VERSION}."
